# Artifact bindings for prebuilt backends.
# Populate these entries with actual hashes/URLs when release binaries are published.
# Runtime resolution expects each artifact to contain one of these layouts:
#   <artifact-root>/spheroidal_batch_double(.dll|.so|.dylib)
#   <artifact-root>/lib/spheroidal_batch_double(...)
#   <artifact-root>/bin/spheroidal_batch_double(...)
# and similarly for quad.

# [spheroidal_backend_double]
# git-tree-sha1 = "<fill-me>"
# [[spheroidal_backend_double.download]]
# url = "https://..."
# sha256 = "<fill-me>"

# [spheroidal_backend_quad]
# git-tree-sha1 = "<fill-me>"
# [[spheroidal_backend_quad.download]]
# url = "https://..."
# sha256 = "<fill-me>"
